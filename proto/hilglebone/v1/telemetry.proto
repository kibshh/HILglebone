syntax = "proto3";

package hilglebone.v1;

// Go output path. Keep in sync with the backend module.
option go_package = "github.com/kibshh/HILglebone/backend/gen/hilglebone/v1";

// ── Response payloads ──────────────────────────────────────────────────────────

// Maps to RSP_ACK. Every command gets exactly one AckResponse.
// `cmd_type` echoes the TYPE byte of the acknowledged command — lets the BBB
// sanity-check that the STM32 interpreted the frame correctly.
// `error_code` matches err_codes.h / ErrorCode in bbb/protocol/constants.py.
// `sensor_id` is 0x00 for non-sensor-scoped commands (CMD_SYNC, CMD_SCENARIO).
message AckResponse {
  uint32 sequence_num = 1;  // frame SEQ byte, used to match ACK to command
  uint32 cmd_type     = 2;  // TYPE byte of the acknowledged command
  uint32 error_code   = 3;
  uint32 sensor_id    = 4;  // 0x00 if the error is not sensor-scoped
}

// Maps to RSP_ERROR. Unsolicited — generated by STM32 when a running sensor
// faults (bus collision, peripheral error, etc.). Has no sequence number.
// `error_code` uses the same code space as AckResponse.
message ErrorResponse {
  uint32 sensor_id  = 1;  // 0x00 if the error is not sensor-scoped
  uint32 error_code = 2;
}

// Maps to STATUS_REPORT. Unsolicited, emitted by the STM32 every 5 seconds.
// Wire payload: uptime_s (u32 LE, 4 bytes) + active_sensor_count (u8) + command_queue_depth (u8).
message StatusReport {
  uint32 uptime_s            = 1;  // seconds since STM32 boot
  uint32 active_sensor_count = 2;  // currently active sensor slots
  uint32 command_queue_depth = 3;  // pending frames in the STM32 receive ring buffer
}

// ── Envelope ───────────────────────────────────────────────────────────────────

// Sent on subject: device.{device_id}.telemetry
message TelemetryEnvelope {
  string device_id    = 1;
  string session_id   = 2;
  int64  timestamp_us = 3;  // unix microseconds (UTC)

  oneof payload {
    AckResponse   ack           = 10;
    ErrorResponse error         = 11;
    StatusReport  status_report = 12;
  }
}
