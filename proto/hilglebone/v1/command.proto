syntax = "proto3";

package hilglebone.v1;

// Go output path. Keep in sync with the backend module.
option go_package = "github.com/kibshh/HILglebone/backend/gen/hilglebone/v1";

import "hilglebone/v1/common.proto";

// ── Command payloads ───────────────────────────────────────────────────────────

// Maps to CMD_SETUP_SENSOR.
// `config` is the protocol-specific config blob defined in the sensor spec;
// the BBB re-encodes it into a STM32 binary frame without interpreting it.
message SetupSensorCommand {
  ProtocolId  protocol_id = 1;
  bytes       config      = 2;
}

// Maps to CMD_SET_OUTPUT.
// `sensor_id` is the external id returned by the BBB after setup.
// `values` is the protocol-specific value blob (e.g. register range for I2C).
message SetOutputCommand {
  uint32 sensor_id = 1;
  bytes  values    = 2;
}

// Maps to CMD_STOP_SENSOR.
message StopSensorCommand {
  uint32 sensor_id = 1;
}

// Maps to CMD_SCENARIO. Payload TBD — scenario engine is Phase 4.
message ScenarioCommand {
  bytes payload = 1;  // placeholder until the scenario schema is defined
}

// Maps to CMD_SYNC. No payload — triggers the handshake sequence.
message SyncCommand {}

// Cloud-only lifecycle notification: the backend has just allocated this
// session to the BBB. The BBB should claim hardware resources and prepare
// to receive command payloads. Not relayed to the STM32.
message SessionStartCommand {}

// Cloud-only lifecycle notification: the session has been ended. The BBB
// should release resources and stop emulating. Not relayed to the STM32.
message SessionStopCommand {}

// ── Runtime grouping ──────────────────────────────────────────────────────────
//
// RuntimeCommand wraps commands the BBB does NOT execute locally — it unwraps
// and re-encodes the payload onto the UART link to the STM32. Keeping these
// behind one envelope variant separates "things the BBB handles" (the
// lifecycle messages above) from "things the BBB just relays" (everything
// here) so the BBB's dispatch logic is a clean two-step.
message RuntimeCommand {
  oneof payload {
    SetupSensorCommand setup_sensor = 1;
    SetOutputCommand   set_output   = 2;
    StopSensorCommand  stop_sensor  = 3;
    ScenarioCommand    scenario     = 4;
    SyncCommand        sync         = 5;
  }
}

// ── Envelope ───────────────────────────────────────────────────────────────────

// Sent on subject: session.{session_id}.command
message CommandEnvelope {
  string message_id   = 1;  // UUID, for deduplication
  string session_id   = 2;
  string device_id    = 3;  // target BBB device
  int64  timestamp_us = 4;  // unix microseconds (UTC)

  oneof payload {
    SessionStartCommand session_start = 10;
    SessionStopCommand  session_stop  = 11;
    RuntimeCommand      runtime       = 12;
  }
}
