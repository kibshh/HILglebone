# Load the USB Ethernet gadget driver at boot. When the BeagleBone's
# micro-USB port is connected to a host PC, this exposes a virtual
# Ethernet interface (usb0) on both sides, allowing SSH/networking
# over the same cable that provides power.
#
# See recipes-bsp/usb-gadget-net/usb-gadget-net.bb for the full setup.
g_ether
